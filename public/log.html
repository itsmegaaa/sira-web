<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Log Aktivitas - SIRA</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D4AF37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(to bottom, #0F172A, #020617);
      min-height: 100vh;
      color: white;
    }
    .glass-card {
      @apply bg-white/10 backdrop-blur-sm border border-white/10 rounded-3xl;
    }
  </style>
</head>
<body class="pb-24">
  
  <!-- App Bar -->
  <header class="sticky top-0 z-40 bg-[#0F172A]/80 backdrop-blur-md border-b border-white/10">
    <div class="px-4 h-16 flex items-center gap-3">
      <button onclick="window.history.back()" class="p-2 -ml-2 text-white/80 hover:text-white rounded-full hover:bg-white/10 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <h1 class="text-lg font-bold tracking-tight flex-1" id="appBarTitle">RIWAYAT AKTIVITAS</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4 max-w-3xl mx-auto space-y-4">
    
    <!-- Skeleton Loading -->
    <div id="skeletonLoading" class="space-y-4 animate-pulse">
      <div class="glass-card p-4"><div class="h-4 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-2/3"></div></div>
      <div class="glass-card p-4"><div class="h-4 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-2/3"></div></div>
      <div class="glass-card p-4"><div class="h-4 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-2/3"></div></div>
      <div class="glass-card p-4"><div class="h-4 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-2/3"></div></div>
      <div class="glass-card p-4"><div class="h-4 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-2/3"></div></div>
    </div>

    <!-- Data Container -->
    <div id="dataContainer" class="hidden space-y-4 flex-col">
      <!-- Logs rendered here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden flex-col items-center justify-center py-20 gap-4">
      <svg class="w-20 h-20 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p class="text-white/40 text-base">Belum ada aktivitas tercatat.</p>
    </div>

  </main>

  <script type="module" src="/js/auth-guard.js"></script>
  <script type="module" src="/js/log.js"></script>
</body>
</html>
