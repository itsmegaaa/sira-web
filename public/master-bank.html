<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Master Bank - SIRA</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D4AF37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(to bottom, #0F172A, #020617);
      min-height: 100vh;
      color: white;
    }
    .glass-card {
      @apply bg-white/10 backdrop-blur-sm border border-white/10 rounded-3xl;
    }
    .input-glass {
      @apply w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37] transition-colors;
    }
  </style>
</head>
<body class="pb-24 relative min-h-screen">
  
  <!-- App Bar -->
  <header class="sticky top-0 z-40 bg-[#0F172A]/80 backdrop-blur-md border-b border-white/10">
    <div class="px-4 h-16 flex items-center gap-3">
      <button onclick="window.history.back()" class="p-2 -ml-2 text-white/80 hover:text-white rounded-full hover:bg-white/10 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <h1 class="text-lg font-bold tracking-tight flex-1">MASTER DATA BANK</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4 max-w-3xl mx-auto space-y-4">
    
    <!-- Search -->
    <div class="relative mb-6">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <input type="text" id="searchInput" class="w-full bg-white/5 border border-white/10 rounded-2xl pl-11 pr-4 py-3.5 text-white placeholder-white/30 focus:outline-none focus:border-[#D4AF37] focus:bg-white/10 transition-all shadow-[0_4px_20px_rgba(0,0,0,0.2)]" placeholder="Cari bank atau PIC...">
    </div>

    <!-- Skeleton Loading -->
    <div id="skeletonLoading" class="space-y-4 animate-pulse">
      <div class="glass-card p-4"><div class="h-5 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-1/2"></div></div>
      <div class="glass-card p-4"><div class="h-5 bg-white/10 rounded w-1/3 mb-2"></div><div class="h-4 bg-white/10 rounded w-1/2"></div></div>
    </div>

    <!-- Data Container -->
    <div id="dataContainer" class="hidden space-y-3 flex-col">
      <!-- Items rendered here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden flex-col items-center justify-center py-20 gap-4">
      <svg class="w-20 h-20 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
      <p class="text-white/40 text-base">Tidak ada data bank.</p>
    </div>

  </main>

  <!-- FAB Add -->
  <button id="fabAdd" class="fixed bottom-6 right-6 w-14 h-14 bg-[#D4AF37] rounded-full flex items-center justify-center text-[#0F172A] shadow-[0_0_30px_rgba(212,175,55,0.4)] hover:bg-[#FBE18D] transition-colors z-30 transform hover:scale-105 active:scale-95">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
  </button>

  <!-- Modal Form -->
  <div id="formModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center hidden">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-[#020617]/80 backdrop-blur-sm modal-backdrop transition-opacity opacity-0"></div>
    
    <!-- Dialog -->
    <div class="relative bg-[#1E293B] border border-white/10 w-full sm:w-[400px] sm:rounded-3xl rounded-t-3xl p-6 transform translate-y-full sm:translate-y-4 opacity-0 transition-all duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] modal-dialog">
      <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-6 sm:hidden"></div>
      
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-white tracking-wide" id="modalTitle">TAMBAH BANK</h3>
        <button id="btnCloseModal" class="p-2 -mr-2 text-white/50 hover:text-white rounded-full hover:bg-white/10 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

      <form id="bankForm" class="space-y-4">
        <input type="hidden" id="editId">
        
        <div>
          <label class="block text-sm font-medium text-white/70 mb-1">Nama Bank <span class="text-red-400">*</span></label>
          <input type="text" id="f_namaBank" required class="input-glass" placeholder="Contoh: BCA KC Jember">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white/70 mb-1">Nama PIC</label>
          <input type="text" id="f_namaPic" class="input-glass" placeholder="Contoh: Bpk. Budi">
        </div>

        <div class="pt-4 flex gap-3">
          <button type="button" id="btnDelete" class="hidden flex-1 bg-red-500/20 text-red-400 border border-red-500/30 font-bold py-3.5 rounded-xl hover:bg-red-500/30 transition-colors flex justify-center items-center gap-2">
            HAPUS
          </button>
          <button type="submit" id="btnSave" class="flex-1 bg-[#D4AF37] text-[#0F172A] font-bold py-3.5 rounded-xl hover:bg-[#FBE18D] transition-colors flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(212,175,55,0.2)]">
            SIMPAN
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/auth-guard.js"></script>
  <script type="module" src="/js/master-bank.js"></script>
</body>
</html>
